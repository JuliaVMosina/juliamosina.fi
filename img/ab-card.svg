<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#1E1B4B"/>
  <radialGradient id="abg1" cx="0.82" cy="0.16" r="0.62">
    <stop offset="0" stop-color="#6366F1" stop-opacity="0.38"/>
    <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="abg2" cx="0.12" cy="0.9" r="0.7">
    <stop offset="0" stop-color="#22D3EE" stop-opacity="0.22"/>
    <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="675" fill="url(#abg1)"/>
  <rect width="1200" height="675" fill="url(#abg2)"/>

  <!-- panel: A vs B bars with CI caps -->
  <g opacity="0.97">
    <rect x="440" y="110" width="430" height="380" rx="16" fill="#2A2660" stroke="#433d8f" stroke-width="1.5"/>
    <!-- baseline -->
    <line x1="480" y1="440" x2="830" y2="440" stroke="#4b4699" stroke-width="2"/>
    <!-- A bar (control, grey, shorter) -->
    <rect x="540" y="300" width="90" height="140" rx="6" fill="#94A3B8"/>
    <line x1="585" y1="285" x2="585" y2="315" stroke="#E2E8F0" stroke-width="3"/>
    <line x1="573" y1="285" x2="597" y2="285" stroke="#E2E8F0" stroke-width="3"/>
    <line x1="573" y1="315" x2="597" y2="315" stroke="#E2E8F0" stroke-width="3"/>
    <text x="585" y="465" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="700" fill="#CBD5E1">A</text>
    <!-- B bar (variant, indigo, taller) -->
    <rect x="690" y="250" width="90" height="190" rx="6" fill="#6366F1"/>
    <line x1="735" y1="235" x2="735" y2="265" stroke="#C7D2FE" stroke-width="3"/>
    <line x1="723" y1="235" x2="747" y2="235" stroke="#C7D2FE" stroke-width="3"/>
    <line x1="723" y1="265" x2="747" y2="265" stroke="#C7D2FE" stroke-width="3"/>
    <text x="735" y="465" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="700" fill="#C7D2FE">B</text>
    <!-- uplift arrow -->
    <text x="815" y="270" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" fill="#22D3EE">↑</text>
  </g>

  <!-- significance curve (top area) -->
  <g opacity="0.8">
    <path d="M905 250 C 945 250, 955 150, 1000 150 C 1045 150, 1055 250, 1095 250"
      fill="none" stroke="#818CF8" stroke-width="3"/>
    <line x1="1000" y1="150" x2="1000" y2="250" stroke="#818CF8" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>

  <!-- mini bars (upper-left accent) -->
  <g opacity="0.5">
    <rect x="92" y="100" width="34" height="64" rx="4" fill="#6366F1"/>
    <rect x="138" y="128" width="34" height="36" rx="4" fill="#94A3B8"/>
    <rect x="184" y="84" width="34" height="80" rx="4" fill="#22D3EE"/>
  </g>
</svg>
