<svg width="940" height="660" viewBox="0 0 940 660" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="940" height="660" fill="#FFFFFF"/>
  <text x="470" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">Retail Analytics — Star Schema</text>
  <text x="470" y="54" text-anchor="middle" font-size="12" fill="#94A3B8">Each dimension joins a fact on its key — one dimension row → many fact rows (1 : ∞)</text>

  <!-- ───── relationship lines (key → key) ───── -->
  <g stroke="#94A3B8" stroke-width="1.6">
    <!-- dim_date.date_key  →  fact_sales.date_key -->
    <line x1="470" y1="150" x2="470" y2="250"/>
    <text x="478" y="168" font-size="12" font-weight="700" fill="#3B6FB5">1</text>
    <text x="478" y="244" font-size="13" font-weight="700" fill="#E59820">∞</text>

    <!-- dim_stores.store_id  →  fact_sales.store_id -->
    <line x1="250" y1="330" x2="360" y2="330"/>
    <text x="256" y="324" font-size="12" font-weight="700" fill="#2E8B6F">1</text>
    <text x="344" y="324" font-size="13" font-weight="700" fill="#E59820">∞</text>

    <!-- dim_products.product_id  →  fact_sales.product_id -->
    <line x1="580" y1="352" x2="690" y2="352"/>
    <text x="676" y="346" font-size="12" font-weight="700" fill="#2E8B6F">1</text>
    <text x="588" y="346" font-size="13" font-weight="700" fill="#E59820">∞</text>

    <!-- shared dims → fact_inventory (dashed = same conformed dimensions) -->
    <path d="M150 410 V470 H360 V520" stroke-dasharray="5 4" fill="none"/>
    <path d="M785 440 V490 H570 V520" stroke-dasharray="5 4" fill="none"/>
    <path d="M470 460 V500" stroke-dasharray="5 4" fill="none"/>
  </g>

  <!-- ███ dim_date ███ -->
  <g>
    <rect x="370" y="70" width="200" height="80" rx="8" fill="#EFF4FB" stroke="#B9CDE8" stroke-width="1.5"/>
    <rect x="370" y="70" width="200" height="24" rx="8" fill="#3B6FB5"/>
    <rect x="370" y="82" width="200" height="12" fill="#3B6FB5"/>
    <text x="382" y="87" font-size="12.5" font-weight="700" fill="#fff">dim_date</text>
    <text x="382" y="112" font-size="11.5" fill="#1E40AF" font-weight="700">🔑 date_key  (PK)</text>
    <text x="382" y="130" font-size="11" fill="#475569">year · quarter · month · week</text>
    <text x="382" y="145" font-size="11" fill="#475569">weekday · is_weekend</text>
  </g>

  <!-- ███ dim_stores ███ -->
  <g>
    <rect x="40" y="290" width="210" height="120" rx="8" fill="#EFF7F4" stroke="#B9DBCF" stroke-width="1.5"/>
    <rect x="40" y="290" width="210" height="24" rx="8" fill="#2E8B6F"/>
    <rect x="40" y="302" width="210" height="12" fill="#2E8B6F"/>
    <text x="52" y="307" font-size="12.5" font-weight="700" fill="#fff">dim_stores</text>
    <text x="52" y="332" font-size="11.5" fill="#166534" font-weight="700">🔑 store_id  (PK)</text>
    <text x="52" y="352" font-size="11" fill="#475569">store_name</text>
    <text x="52" y="370" font-size="11" fill="#475569">region</text>
    <text x="52" y="388" font-size="11" fill="#475569">size_m2</text>
    <text x="52" y="404" font-size="11" fill="#475569">opened_date</text>
  </g>

  <!-- ███ dim_products ███ -->
  <g>
    <rect x="690" y="290" width="210" height="150" rx="8" fill="#EFF7F4" stroke="#B9DBCF" stroke-width="1.5"/>
    <rect x="690" y="290" width="210" height="24" rx="8" fill="#2E8B6F"/>
    <rect x="690" y="302" width="210" height="12" fill="#2E8B6F"/>
    <text x="702" y="307" font-size="12.5" font-weight="700" fill="#fff">dim_products</text>
    <text x="702" y="332" font-size="11.5" fill="#166534" font-weight="700">🔑 product_id  (PK)</text>
    <text x="702" y="352" font-size="11" fill="#475569">product_name</text>
    <text x="702" y="370" font-size="11" fill="#475569">category</text>
    <text x="702" y="388" font-size="11" fill="#475569">subcategory</text>
    <text x="702" y="406" font-size="11" fill="#475569">unit_cost</text>
    <text x="702" y="424" font-size="11" fill="#475569">unit_price</text>
  </g>

  <!-- ███ fact_sales ███ (center) -->
  <g>
    <rect x="360" y="250" width="220" height="160" rx="8" fill="#FBF1E8" stroke="#E6C39C" stroke-width="2"/>
    <rect x="360" y="250" width="220" height="24" rx="8" fill="#E59820"/>
    <rect x="360" y="262" width="220" height="12" fill="#E59820"/>
    <text x="372" y="267" font-size="12.5" font-weight="700" fill="#fff">fact_sales</text>
    <text x="372" y="292" font-size="11.5" fill="#9A3412" font-weight="700">🔑 sale_id  (PK)</text>
    <text x="372" y="313" font-size="11" fill="#B45309" font-weight="600">FK  store_id   →  dim_stores</text>
    <text x="372" y="333" font-size="11" fill="#B45309" font-weight="600">FK  date_key  →  dim_date</text>
    <text x="372" y="353" font-size="11" fill="#B45309" font-weight="600">FK  product_id →  dim_products</text>
    <line x1="372" y1="364" x2="568" y2="364" stroke="#E6C39C" stroke-width="1"/>
    <text x="372" y="380" font-size="11" fill="#475569">quantity · discount</text>
    <text x="372" y="398" font-size="11" fill="#475569">revenue</text>
  </g>

  <!-- ███ fact_inventory ███ (second fact, shares dims) -->
  <g>
    <rect x="360" y="520" width="220" height="110" rx="8" fill="#FBF1E8" stroke="#E6C39C" stroke-width="2"/>
    <rect x="360" y="520" width="220" height="24" rx="8" fill="#E59820"/>
    <rect x="360" y="532" width="220" height="12" fill="#E59820"/>
    <text x="372" y="537" font-size="12.5" font-weight="700" fill="#fff">fact_inventory</text>
    <text x="372" y="562" font-size="11" fill="#B45309" font-weight="600">FK  store_id · product_id · snapshot_date</text>
    <line x1="372" y1="572" x2="568" y2="572" stroke="#E6C39C" stroke-width="1"/>
    <text x="372" y="589" font-size="11" fill="#475569">stock_on_hand</text>
    <text x="372" y="607" font-size="11" fill="#475569">reorder_level</text>
  </g>

  <text x="470" y="650" text-anchor="middle" font-size="10.5" fill="#94A3B8" font-style="italic">fact_inventory reuses the same conformed dimensions (dashed) — galaxy schema</text>

  <!-- legend -->
  <g font-size="11" fill="#64748B">
    <rect x="40" y="486" width="13" height="13" rx="3" fill="#E59820"/>
    <text x="59" y="496">Fact table</text>
    <rect x="135" y="486" width="13" height="13" rx="3" fill="#2E8B6F"/>
    <text x="154" y="496">Dimension</text>
    <text x="245" y="496">🔑 PK · FK = foreign key · 1 : ∞ = one-to-many</text>
  </g>
</svg>
