<svg width="940" height="660" viewBox="0 0 940 660" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="940" height="660" fill="#FFFFFF"/>
  <text x="470" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">Retail Analytics — Star Schema</text>
  <text x="470" y="54" text-anchor="middle" font-size="12" fill="#94A3B8">Each dimension joins a fact on its key — one dimension row → many fact rows (1 : ∞)</text>

  <!-- ───── solid relationship lines: fact_sales ↔ dimensions ───── -->
  <g stroke="#94A3B8" stroke-width="1.6">
    <line x1="470" y1="158" x2="470" y2="252"/>
    <text x="478" y="176" font-size="12" font-weight="700" fill="#3B6FB5">1</text>
    <text x="478" y="246" font-size="13" font-weight="700" fill="#E59820">∞</text>
    <line x1="250" y1="312" x2="360" y2="312"/>
    <text x="256" y="306" font-size="12" font-weight="700" fill="#2E8B6F">1</text>
    <text x="344" y="306" font-size="13" font-weight="700" fill="#E59820">∞</text>
    <line x1="580" y1="332" x2="690" y2="332"/>
    <text x="676" y="326" font-size="12" font-weight="700" fill="#2E8B6F">1</text>
    <text x="588" y="326" font-size="13" font-weight="700" fill="#E59820">∞</text>
  </g>

  <!-- ───── one dashed link: fact_inventory shares the same dims ───── -->
  <line x1="470" y1="410" x2="470" y2="470" stroke="#B6C2CC" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="486" y="446" font-size="10.5" fill="#94A3B8" font-style="italic">reuses the same</text>
  <text x="486" y="459" font-size="10.5" fill="#94A3B8" font-style="italic">3 dimensions</text>

  <!-- ███ dim_date ███ -->
  <g>
    <rect x="370" y="78" width="200" height="80" rx="8" fill="#EFF4FB" stroke="#B9CDE8" stroke-width="1.5"/>
    <rect x="370" y="78" width="200" height="24" rx="8" fill="#3B6FB5"/>
    <rect x="370" y="90" width="200" height="12" fill="#3B6FB5"/>
    <text x="382" y="95" font-size="12.5" font-weight="700" fill="#fff">dim_date</text>
    <text x="382" y="120" font-size="11.5" fill="#1E40AF" font-weight="700">🔑 date_key  (PK)</text>
    <text x="382" y="138" font-size="11" fill="#475569">year · quarter · month · week</text>
    <text x="382" y="153" font-size="11" fill="#475569">weekday · is_weekend</text>
  </g>

  <!-- ███ dim_stores ███ -->
  <g>
    <rect x="40" y="252" width="210" height="120" rx="8" fill="#EFF7F4" stroke="#B9DBCF" stroke-width="1.5"/>
    <rect x="40" y="252" width="210" height="24" rx="8" fill="#2E8B6F"/>
    <rect x="40" y="264" width="210" height="12" fill="#2E8B6F"/>
    <text x="52" y="269" font-size="12.5" font-weight="700" fill="#fff">dim_stores</text>
    <text x="52" y="294" font-size="11.5" fill="#166534" font-weight="700">🔑 store_id  (PK)</text>
    <text x="52" y="314" font-size="11" fill="#475569">store_name</text>
    <text x="52" y="332" font-size="11" fill="#475569">region</text>
    <text x="52" y="350" font-size="11" fill="#475569">size_m2</text>
    <text x="52" y="366" font-size="11" fill="#475569">opened_date</text>
  </g>

  <!-- ███ dim_products ███ -->
  <g>
    <rect x="690" y="252" width="210" height="150" rx="8" fill="#EFF7F4" stroke="#B9DBCF" stroke-width="1.5"/>
    <rect x="690" y="252" width="210" height="24" rx="8" fill="#2E8B6F"/>
    <rect x="690" y="264" width="210" height="12" fill="#2E8B6F"/>
    <text x="702" y="269" font-size="12.5" font-weight="700" fill="#fff">dim_products</text>
    <text x="702" y="294" font-size="11.5" fill="#166534" font-weight="700">🔑 product_id  (PK)</text>
    <text x="702" y="314" font-size="11" fill="#475569">product_name</text>
    <text x="702" y="332" font-size="11" fill="#475569">category</text>
    <text x="702" y="350" font-size="11" fill="#475569">subcategory</text>
    <text x="702" y="368" font-size="11" fill="#475569">unit_cost</text>
    <text x="702" y="386" font-size="11" fill="#475569">unit_price</text>
  </g>

  <!-- ███ fact_sales ███ -->
  <g>
    <rect x="360" y="252" width="220" height="158" rx="8" fill="#FBF1E8" stroke="#E6C39C" stroke-width="2"/>
    <rect x="360" y="252" width="220" height="24" rx="8" fill="#E59820"/>
    <rect x="360" y="264" width="220" height="12" fill="#E59820"/>
    <text x="372" y="269" font-size="12.5" font-weight="700" fill="#fff">fact_sales</text>
    <text x="372" y="294" font-size="11.5" fill="#9A3412" font-weight="700">🔑 sale_id  (PK)</text>
    <text x="372" y="314" font-size="11" fill="#B45309" font-weight="600">FK  store_id   → dim_stores</text>
    <text x="372" y="332" font-size="11" fill="#B45309" font-weight="600">FK  date_key  → dim_date</text>
    <text x="372" y="350" font-size="11" fill="#B45309" font-weight="600">FK  product_id → dim_products</text>
    <line x1="372" y1="362" x2="568" y2="362" stroke="#E6C39C" stroke-width="1"/>
    <text x="372" y="379" font-size="11" fill="#475569">quantity · discount</text>
    <text x="372" y="397" font-size="11" fill="#475569">revenue</text>
  </g>

  <!-- ███ fact_inventory ███ -->
  <g>
    <rect x="360" y="470" width="220" height="110" rx="8" fill="#FBF1E8" stroke="#E6C39C" stroke-width="2"/>
    <rect x="360" y="470" width="220" height="24" rx="8" fill="#E59820"/>
    <rect x="360" y="482" width="220" height="12" fill="#E59820"/>
    <text x="372" y="487" font-size="12.5" font-weight="700" fill="#fff">fact_inventory</text>
    <text x="372" y="512" font-size="11" fill="#B45309" font-weight="600">FK  store_id · product_id · snapshot_date</text>
    <line x1="372" y1="522" x2="568" y2="522" stroke="#E6C39C" stroke-width="1"/>
    <text x="372" y="539" font-size="11" fill="#475569">stock_on_hand</text>
    <text x="372" y="557" font-size="11" fill="#475569">reorder_level</text>
  </g>

  <!-- legend (clear at the bottom, no lines nearby) -->
  <g font-size="11" fill="#64748B">
    <rect x="40" y="618" width="13" height="13" rx="3" fill="#E59820"/>
    <text x="59" y="628">Fact table</text>
    <rect x="150" y="618" width="13" height="13" rx="3" fill="#2E8B6F"/>
    <text x="169" y="628">Dimension</text>
    <text x="270" y="628">🔑 PK   ·   FK = foreign key   ·   1 : ∞ = one-to-many</text>
  </g>
</svg>
