<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#1B2B40"/>
  <radialGradient id="ag1" cx="0.82" cy="0.16" r="0.6">
    <stop offset="0" stop-color="#F4511E" stop-opacity="0.30"/>
    <stop offset="1" stop-color="#F4511E" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="ag2" cx="0.12" cy="0.9" r="0.7">
    <stop offset="0" stop-color="#8B3FC8" stop-opacity="0.40"/>
    <stop offset="1" stop-color="#8B3FC8" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="675" fill="url(#ag1)"/>
  <rect width="1200" height="675" fill="url(#ag2)"/>

  <!-- floating exec panel -->
  <g opacity="0.96">
    <rect x="430" y="70" width="710" height="430" rx="18" fill="#23364D" stroke="#37506E" stroke-width="1.5"/>

    <!-- KPI row -->
    <g>
      <rect x="460" y="96" width="150" height="76" rx="10" fill="#2C4259"/>
      <rect x="476" y="112" width="62" height="16" rx="4" fill="#F4511E"/>
      <rect x="476" y="138" width="96" height="8" rx="4" fill="#3E587A"/>
      <rect x="626" y="96" width="150" height="76" rx="10" fill="#2C4259"/>
      <rect x="642" y="112" width="48" height="16" rx="4" fill="#FF8C42"/>
      <rect x="642" y="138" width="96" height="8" rx="4" fill="#3E587A"/>
      <rect x="792" y="96" width="150" height="76" rx="10" fill="#2C4259"/>
      <rect x="808" y="112" width="56" height="16" rx="4" fill="#F0314A"/>
      <rect x="808" y="138" width="96" height="8" rx="4" fill="#3E587A"/>
      <rect x="958" y="96" width="152" height="76" rx="10" fill="#2C4259"/>
      <rect x="974" y="112" width="52" height="16" rx="4" fill="#8B3FC8"/>
      <rect x="974" y="138" width="94" height="8" rx="4" fill="#3E587A"/>
    </g>

    <!-- donut (revenue by region) -->
    <g transform="translate(560,340)">
      <circle r="78" fill="none" stroke="#2C4259" stroke-width="30"/>
      <circle r="78" fill="none" stroke="#F4511E" stroke-width="30" stroke-dasharray="170 320" transform="rotate(-90)"/>
      <circle r="78" fill="none" stroke="#8B3FC8" stroke-width="30" stroke-dasharray="95 320" stroke-dashoffset="-170" transform="rotate(-90)"/>
      <circle r="78" fill="none" stroke="#FF8C42" stroke-width="30" stroke-dasharray="60 320" stroke-dashoffset="-265" transform="rotate(-90)"/>
    </g>

    <!-- horizontal bars (service lines) -->
    <g>
      <rect x="800" y="210" width="310" height="270" rx="10" fill="#2C4259"/>
      <rect x="820" y="232" width="240" height="20" rx="4" fill="#F4511E"/>
      <rect x="820" y="272" width="180" height="20" rx="4" fill="#FF8C42"/>
      <rect x="820" y="312" width="130" height="20" rx="4" fill="#F0314A"/>
      <rect x="820" y="352" width="95" height="20" rx="4" fill="#8B3FC8"/>
      <rect x="820" y="420" width="120" height="9" rx="4" fill="#3E587A"/>
    </g>
  </g>

  <!-- mini bars (upper-left accent) -->
  <g opacity="0.5">
    <rect x="92" y="100" width="34" height="64" rx="4" fill="#F4511E"/>
    <rect x="138" y="128" width="34" height="36" rx="4" fill="#FF8C42"/>
    <rect x="184" y="84" width="34" height="80" rx="4" fill="#F0314A"/>
  </g>
</svg>
