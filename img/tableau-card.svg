    <rect x="948" y="236" width="92" height="20" rx="3" fill="#F28E2B"/>
    <rect x="948" y="266" width="60" height="20" rx="3" fill="#E15759"/>

    <!-- KPI strip -->
    <g>
      <rect x="430" y="330" width="166" height="70" rx="10" fill="#1E4866"/>
      <rect x="448" y="350" width="60" height="18" rx="4" fill="#4E79A7"/>
      <rect x="448" y="378" width="110" height="8" rx="4" fill="#3A5E7E"/>
      <rect x="612" y="330" width="166" height="70" rx="10" fill="#1E4866"/>
