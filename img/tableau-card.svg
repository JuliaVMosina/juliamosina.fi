      <rect x="794" y="330" width="166" height="70" rx="10" fill="#1E4866"/>
      <rect x="812" y="350" width="56" height="18" rx="4" fill="#76B7B2"/>
      <rect x="812" y="378" width="110" height="8" rx="4" fill="#3A5E7E"/>
      <rect x="976" y="330" width="164" height="70" rx="10" fill="#1E4866"/>
